<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Task - Task Reminder</title>
  <link rel="stylesheet" href="addTask.css">
</head>
<body>
  <div class="container">
    <h1>📌 Add New Task</h1>
    <form id="taskForm">
      <div class="form-group">
        <label for="taskId">Task ID (Unique)</label>
        <input type="text" id="taskId" placeholder="Enter unique task ID" required>
      </div>

      <div class="form-group">
        <label for="taskName">Task Name</label>
        <input type="text" id="taskName" placeholder="Enter task name" required>
      </div>

      <div class="form-group">
        <label for="taskDate">Date for Reminder</label>
        <input type="date" id="taskDate" required>
      </div>

      <div class="form-group">
        <label for="taskTime">Time for Reminder</label>
        <input type="time" id="taskTime" required>
      </div>

      <div class="form-group">
        <label for="phoneNumber">Phone Number</label>
        <input type="tel" id="phoneNumber" placeholder="+91XXXXXXXXXX" required>
      </div>

      <div class="form-group">
        <label for="reminderType">Reminder Type</label>
        <select id="reminderType" required>
          <option value="">-- Select --</option>
          <option value="sms">SMS</option>
          <option value="call">Call</option>
        </select>
      </div>

      <button type="submit">➕ Add Task</button>
    </form>

    <!-- Success message (hidden initially) -->
    <p id="successMsg" class="hidden"></p>
  </div>

  <script src="addTask.js"></script>
</body>
</html>
