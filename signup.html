<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Reminder - Signup</title>
  <link rel="stylesheet" href="signup.css">
</head>
<body>
  <div class="login-container">
    <h1 class="title">Task Reminder</h1>
    <form class="login-form">
      <h2>Signup Form</h2>
      <div class="input-group">
        <label for="name">Name</label>
        <input type="text" id="email" placeholder="Enter your Full Name" required>
      </div>
      <div class="input-group">
        <label for="gmail">E-Mail</label>
        <input type="email" id="email" placeholder="Enter your email Id" required>
      </div>
      <div class="input-group">
        <label for="phoneNumber">Phone No.</label>
        <input type="number" id="password" placeholder="Enter your Phone no." required>
      </div>
      <button type="submit" class="btn">Sign-Up</button>
      <p class="signup-text"> If You have an account? <a href="login.html">Log In</a></p>
    </form>
  </div>
  <!-- <script src="login.js"></script> -->
</body>
</html>
