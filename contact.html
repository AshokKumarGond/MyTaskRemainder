<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Task Reminder</title>
  <link rel="stylesheet" href="contact.css">
</head>
<body>
  <div class="contact-container">
    <h1>Contact Us</h1>
    <p class="subtitle">We’d love to hear from you! Fill out the form below 👇</p>

    <form class="contact-form">
      <div class="input-group">
        <label for="name" id="text2">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" required>
      </div>

      <div class="input-group">
        <label for="email" id="text2">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label for="message" id="text2">Message</label>
        <textarea id="message" placeholder="Write your message here..." rows="5" required></textarea>
      </div>

      <button type="submit" class="btn">Send Message</button>
    </form>

    <div class="contact-info">
      <p>📧 Email: ashokgond@gmail.com</p>
      <p>📞 Phone: +91 98765 43210</p>
      <p>📍 Location: Maharajganj,Utter Pradesh, India</p>
    </div>
  </div>
  <script src="contact.js"></script>
</body>
</html>
